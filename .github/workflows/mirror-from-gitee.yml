name: Mirror from Gitee

on:
  workflow_dispatch:
  schedule:
    - cron: "47 * * * *"

permissions:
  contents: write

concurrency:
  group: mirror-from-gitee
  cancel-in-progress: false

jobs:
  mirror:
    if: github.repository_owner == 'charsen'
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Gitee repository to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT

          git clone --mirror "https://gitee.com/charsen/${REPO}.git" "$workdir/repo.git"
          cd "$workdir/repo.git"

          git remote set-url --push origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --mirror
